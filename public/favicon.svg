<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E3BD" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#E6C762" />
    </linearGradient>
    <linearGradient id="darkBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#14141F" />
      <stop offset="100%" stop-color="#08080C" />
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#darkBg)" stroke="url(#gold)" stroke-width="12" />
  <!-- Scales of Justice Icon -->
  <g fill="url(#gold)" transform="translate(106, 110)">
    <!-- Central Pillar -->
    <path d="M142,50 L158,50 L158,235 L142,235 Z" />
    <!-- Pillar Base -->
    <path d="M110,235 L190,235 L190,251 L110,251 Z" />
    <path d="M90,251 L210,251 L210,267 L90,267 Z" />
    <!-- Top Decorative Knob -->
    <circle cx="150" cy="38" r="14" />
    
    <!-- Crossbeam (Pivot point at 150, 80) -->
    <path d="M30,85 L150,75 L270,85 L150,81 Z" />
    <circle cx="150" cy="78" r="8" />
    
    <!-- Left Scale (Hanger at 30, 85) -->
    <!-- Hanger Ring -->
    <circle cx="30" cy="85" r="4" />
    <!-- Chains -->
    <line x1="30" y1="85" x2="5" y2="160" stroke="url(#gold)" stroke-width="2.5" />
    <line x1="30" y1="85" x2="55" y2="160" stroke="url(#gold)" stroke-width="2.5" />
    <!-- Left Pan -->
    <path d="M1,160 L59,160 C55,185 5,185 1,160 Z" />
    
    <!-- Right Scale (Hanger at 270, 85) -->
    <!-- Hanger Ring -->
    <circle cx="270" cy="85" r="4" />
    <!-- Chains -->
    <line x1="270" y1="85" x2="245" y2="160" stroke="url(#gold)" stroke-width="2.5" />
    <line x1="270" y1="85" x2="295" y2="160" stroke="url(#gold)" stroke-width="2.5" />
    <!-- Right Pan -->
    <path d="M241,160 L299,160 C295,185 245,185 241,160 Z" />
  </g>
</svg>
