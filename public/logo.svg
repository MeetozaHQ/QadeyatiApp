<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E3BD" />
      <stop offset="30%" stop-color="#D4AF37" />
      <stop offset="70%" stop-color="#AA7C11" />
      <stop offset="100%" stop-color="#E6C762" />
    </linearGradient>
  </defs>
  
  <g transform="translate(10, 10)">
    <!-- Small elegant Scales of Justice Icon on the left -->
    <g fill="url(#gold)" transform="scale(0.2) translate(0, 30)">
      <!-- Background Circle -->
      <circle cx="150" cy="150" r="140" fill="#0A0A0F" stroke="url(#gold)" stroke-width="10" />
      <!-- Scales Icon inside circle -->
      <g fill="url(#gold)" transform="translate(0, -10)">
        <path d="M142,80 L158,80 L158,235 L142,235 Z" />
        <path d="M110,235 L190,235 L190,251 L110,251 Z" />
        <path d="M90,235 L210,235 L210,251 L90,251 Z" />
        <circle cx="150" cy="68" r="14" />
        <path d="M30,115 L150,105 L270,115 L150,111 Z" />
        <circle cx="150" cy="108" r="8" />
        <circle cx="30" cy="115" r="4" />
        <line x1="30" y1="115" x2="5" y2="190" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" />
        <line x1="30" y1="115" x2="55" y2="190" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" />
        <path d="M1,190 L59,190 C55,215 5,215 1,190 Z" />
        <circle cx="270" cy="115" r="4" />
        <line x1="270" y1="115" x2="245" y2="190" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" />
        <line x1="270" y1="115" x2="295" y2="190" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" />
        <path d="M241,190 L299,190 C295,215 245,215 241,190 Z" />
      </g>
    </g>

    <!-- Logo text "قضيتي" in Arabic -->
    <text x="80" y="40" font-family="'Cairo', system-ui, -apple-system, sans-serif" font-weight="800" font-size="28" fill="url(#gold)" letter-spacing="0.5">قضيتي</text>
    <text x="80" y="56" font-family="'Cairo', system-ui, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#a1a1aa" letter-spacing="0.5">نظامك القانوني المتكامل</text>
  </g>
</svg>
